services:
  # Container A: minisync node on port 9001
  node-a:
    build: .
    command: ["/data", "0.0.0.0:9001"]
    ports:
      - "9001:9001"
    volumes:
      - node-a-data:/data

  # Container B: minisync node on port 9002, connects to A
  node-b:
    build: .
    command: ["/data", "0.0.0.0:9002", "node-a:9001"]
    ports:
      - "9002:9002"
    volumes:
      - node-b-data:/data
    depends_on:
      - node-a

volumes:
  node-a-data:
  node-b-data:
